<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AWS Spend</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;padding:24px;background:#f8f9fb;color:#1a1a2e}
    nav{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    nav a{padding:6px 14px;border-radius:6px;text-decoration:none;font-size:.875rem;background:#fff;border:1px solid #ddd;color:#333}
    nav a.active,nav a:hover{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
    h1{margin:0 0 4px}
    p.sub{color:#666;margin:0 0 20px;font-size:.9rem}
    .status{padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:.9rem}
    .status.loading{background:#eef2ff;color:#3730a3}
    .status.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .status.warn{background:#fef9c3;color:#92400e;border:1px solid #fde68a}
    .refresh{font-size:.8rem;color:#888;margin-bottom:16px}
    .period-note{font-size:.82rem;color:#666;margin-bottom:16px}
    .total-row{display:flex;align-items:baseline;gap:10px;margin-bottom:20px}
    .total-label{font-size:.85rem;color:#555;text-transform:uppercase;letter-spacing:.05em}
    .total-value{font-size:2rem;font-weight:700;color:#1a1a2e}
    .total-currency{font-size:.9rem;color:#888}
    .service-list{background:#fff;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;max-width:640px;margin-bottom:24px}
    .service-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #f0f0f0}
    .service-row:last-child{border-bottom:none}
    .service-name{flex:1;font-size:.88rem}
    .service-amount{font-size:.9rem;font-weight:600;min-width:70px;text-align:right}
    .bar-wrap{width:140px;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;background:#2563eb;border-radius:4px}
    .login-prompt{background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:16px;max-width:400px;margin-bottom:20px}
    .login-prompt p{margin:0 0 10px;font-size:.9rem;color:#78350f}
    .login-prompt a{display:inline-block;padding:7px 18px;background:#1a1a2e;color:#fbbf24;border:none;border-radius:6px;cursor:pointer;font-size:.875rem;text-decoration:none;font-weight:600}
    .login-prompt a:hover{background:#2d2d4e}
  </style>
</head>
<body>
  <nav id="main-nav"></nav>
  <script src="/auth.js"></script>
  <script>DashAuth.renderNav('spend'); DashAuth.guardAdminPage();</script>
  <h1>AWS Spend</h1>
  <p class="sub">Monthly cost breakdown by service (last 30 days). Admin access required.</p>

  <div id="login-prompt" class="login-prompt" style="display:none">
    <p id="login-prompt-msg">Admin sign-in required to view spend data.</p>
    <a href="https://auth-service-rodmen07-v2.fly.dev/dashboard/login">Sign in →</a>
  </div>

  <div id="global-status" class="status loading">Loading spend data…</div>
  <div id="period-note" class="period-note" style="display:none"></div>
  <div id="total-row" class="total-row" style="display:none">
    <span class="total-label">Total (30 days)</span>
    <span class="total-value" id="total-value">—</span>
    <span class="total-currency" id="total-currency">USD</span>
  </div>
  <div id="service-list" class="service-list" style="display:none"></div>
  <div class="refresh" id="refresh-note"></div>

  <script>
    function showLoginPrompt(expired) {
      document.getElementById('global-status').style.display = 'none';
      const prompt = document.getElementById('login-prompt');
      if (expired) {
        document.getElementById('login-prompt-msg').textContent = 'Session expired. Please sign in again.';
      }
      prompt.style.display = '';
    }

    async function loadAll() {
      const token = DashAuth.getToken();
      if (!token) { showLoginPrompt(false); return; }

      const gs = document.getElementById('global-status');
      gs.className = 'status loading';
      gs.textContent = 'Loading spend data…';
      gs.style.display = '';
      document.getElementById('login-prompt').style.display = 'none';

      let data;
      try {
        const r = await fetch('/api/spend', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (r.status === 401) {
          sessionStorage.removeItem(JWT_SESSION);
          showLoginPrompt(true);
          return;
        }
        if (!r.ok) throw new Error('HTTP ' + r.status);
        data = await r.json();
      } catch (e) {
        gs.className = 'status error';
        gs.textContent = 'Could not load spend data: ' + e.message;
        return;
      }

      gs.style.display = 'none';

      // Period note
      const pn = document.getElementById('period-note');
      pn.textContent = 'Period: ' + data.period.start + ' → ' + data.period.end;
      pn.style.display = '';

      // Total
      const tr = document.getElementById('total-row');
      document.getElementById('total-value').textContent = '$' + Number(data.total).toFixed(2);
      document.getElementById('total-currency').textContent = data.currency || 'USD';
      tr.style.display = '';

      // Service list
      const list = document.getElementById('service-list');
      list.style.display = '';
      list.innerHTML = '';

      const services = data.by_service || [];
      const maxAmount = services.length > 0
        ? Math.max(...services.map(s => parseFloat(s.amount) || 0))
        : 1;

      services.forEach(s => {
        const amount = parseFloat(s.amount) || 0;
        const pct = maxAmount > 0 ? (amount / maxAmount) * 100 : 0;
        const row = document.createElement('div');
        row.className = 'service-row';
        row.innerHTML = `
          <span class="service-name">${s.service}</span>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
          <span class="service-amount">$${amount.toFixed(4)}</span>
        `;
        list.appendChild(row);
      });

      if (services.length === 0) {
        const row = document.createElement('div');
        row.className = 'service-row';
        row.innerHTML = '<span style="color:#9ca3af;font-style:italic">No billable services in this period.</span>';
        list.appendChild(row);
      }

      document.getElementById('refresh-note').textContent =
        'Last updated: ' + new Date().toLocaleTimeString();
    }

    loadAll();
    setInterval(loadAll, 300000); // 5-minute refresh
  </script>
</body>
</html>
