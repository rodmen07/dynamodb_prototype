<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gold Metrics Dashboard</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;padding:24px;background:#f8f9fb;color:#1a1a2e}
    nav{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    nav a{padding:6px 14px;border-radius:6px;text-decoration:none;font-size:.875rem;background:#fff;border:1px solid #ddd;color:#333}
    nav a.active,nav a:hover{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
    h1{margin:0 0 4px}
    p.sub{color:#666;margin:0 0 20px;font-size:.9rem}
    .stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
    .stat{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px 20px;min-width:130px}
    .stat-label{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.05em}
    .stat-value{font-size:1.6rem;font-weight:700;margin-top:2px}
    .stat-value.gold{color:#b8860b}
    .status{padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:.9rem}
    .status.loading{background:#eef2ff;color:#3730a3}
    .status.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .status.empty{background:#f0fdf4;color:#166534}
    table{border-collapse:collapse;width:100%;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    th{background:#f4f4f7;padding:10px 12px;text-align:left;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:#555}
    td{border-top:1px solid #eee;padding:10px 12px;vertical-align:top;font-size:.875rem}
    td:last-child{max-width:420px}
    pre{white-space:pre-wrap;word-break:break-all;margin:0;font-size:.8rem;background:#f8f9fb;padding:6px;border-radius:4px}
    .refresh{font-size:.8rem;color:#888;margin-bottom:8px}
  </style>
</head>
<body>
  <nav>
    <a href="/overview">Overview</a>
    <a href="/" class="active">Gold</a>
    <a href="/silver">Silver</a>
    <a href="/bronze">Bronze</a>
    <a href="/builds">Builds</a>
    <a href="/infrastructure">Infrastructure</a>
    <a href="/spend">Spend</a>
  </nav>
  <h1>Gold Metrics</h1>
  <p class="sub">Aggregated medallion pipeline output — <code>stage#gold</code> records from DynamoDB.</p>
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-label">Bronze</div><div class="stat-value" id="cnt-bronze">—</div></div>
    <div class="stat"><div class="stat-label">Cleaned</div><div class="stat-value" id="cnt-cleaned">—</div></div>
    <div class="stat"><div class="stat-label">Silver</div><div class="stat-value" id="cnt-silver">—</div></div>
    <div class="stat"><div class="stat-label">Gold</div><div class="stat-value gold" id="cnt-gold">—</div></div>
  </div>
  <div class="refresh" id="refresh-note"></div>
  <div id="status-msg" class="status loading">Loading records…</div>
  <table id="metrics" style="display:none">
    <thead><tr><th>When</th><th>Metric</th><th>Payload</th></tr></thead>
    <tbody></tbody>
  </table>
  <script>
    function esc(v){
      return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    async function load() {
      const statusEl = document.getElementById('status-msg');
      const table = document.getElementById('metrics');
      statusEl.className = 'status loading';
      statusEl.textContent = 'Loading records…';
      statusEl.style.display = '';
      table.style.display = 'none';
      try {
        const res = await fetch('/api/gold');
        if (!res.ok) throw new Error(`API error ${res.status}: ${res.statusText}`);
        const data = await res.json();
        const tbody = table.querySelector('tbody');
        tbody.innerHTML = '';
        if (!data.length) {
          statusEl.className = 'status empty';
          statusEl.textContent = 'No gold records found.';
          return;
        }
        data.forEach(item => {
          const tr = document.createElement('tr');
          const whenVal = item.when ? new Date(item.when * 1000).toISOString() : '—';
          const metricVal = item.metric != null ? String(item.metric) : '—';
          const tdWhen = document.createElement('td');
          tdWhen.textContent = whenVal;
          const tdMetric = document.createElement('td');
          tdMetric.textContent = metricVal;
          const tdPayload = document.createElement('td');
          const pre = document.createElement('pre');
          pre.textContent = JSON.stringify(item, null, 2);
          tdPayload.appendChild(pre);
          tr.appendChild(tdWhen);
          tr.appendChild(tdMetric);
          tr.appendChild(tdPayload);
          tbody.appendChild(tr);
        });
        statusEl.style.display = 'none';
        table.style.display = '';
      } catch(e) {
        statusEl.className = 'status error';
        statusEl.textContent = `Error loading records: ${e.message}`;
      }
    }
    async function loadStats() {
      try {
        const s = await fetch('/api/stats');
        if (!s.ok) return;
        const js = await s.json();
        if (js.counts) {
          document.getElementById('cnt-bronze').textContent = js.counts.bronze || 0;
          document.getElementById('cnt-cleaned').textContent = js.counts.bronze_cleaned || 0;
          document.getElementById('cnt-silver').textContent = js.counts.silver || 0;
          document.getElementById('cnt-gold').textContent = js.counts.gold || 0;
        }
      } catch(e) { console.warn('Stats fetch failed', e); }
    }
    async function loadAll() {
      await Promise.all([load(), loadStats()]);
      document.getElementById('refresh-note').textContent =
        'Last updated: ' + new Date().toLocaleTimeString();
    }
    loadAll();
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
